@if (auth.isLoggedIn$ | async) {
  <div
    class="dock dock-md relative z-0 shrink-0 justify-between border-t border-gray-100 pb-[env(safe-area-inset-bottom)] sm:justify-center"
  >
    @if (auth.canAccessManagement()) {
      <a [routerLink]="routes.Dashboard" [routerLinkActive]="'dock-active'">
        <app-icon name="icon-dashboard" [class]="'size-[1.2em]'" [fill]="'#000000'"></app-icon>
        <span class="dock-label">Dashboard</span>
      </a>
    }

    <a [routerLink]="routes.OrdersEditor" [routerLinkActive]="'dock-active'">
      <app-icon name="icon-plus" [class]="'size-[1.2em]'" [fill]="'#000000'"></app-icon>
      <span class="dock-label">New Order</span>
    </a>

    <a [routerLink]="routes.OrdersList" [routerLinkActive]="'dock-active'">
      <app-icon name="icon-file" [class]="'size-[1.2em]'" [fill]="'#000000'"></app-icon>
      <span class="dock-label">Orders</span>
    </a>

    @if (auth.canAccessManagement()) {
      <a [routerLink]="routes.ManagementRoot" [routerLinkActive]="'dock-active'">
        <app-icon name="icon-management" [class]="'size-[1.2em]'" [fill]="'#000000'"></app-icon>
        <span class="dock-label">Management</span>
      </a>
    }
  </div>
}
