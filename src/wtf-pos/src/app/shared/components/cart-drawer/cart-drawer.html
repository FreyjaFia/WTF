<div
  class="fixed inset-y-0 right-0 z-50 w-screen lg:hidden md:[left:var(--sidebar-width,0px)] md:[width:calc(100vw-var(--sidebar-width,0px))]"
  style="padding-top: max(var(--safe-area-top, 0px), env(safe-area-inset-top)); padding-bottom: max(var(--safe-area-bottom, 0px), env(safe-area-inset-bottom))"
  [class.pointer-events-auto]="isOpen()"
  [class.pointer-events-none]="!isOpen()"
>
  <div
    class="absolute inset-0 bg-black/30 backdrop-blur-[1px] transition-opacity ease-in-out"
    [class.duration-300]="hasTransitions()"
    [class.duration-0]="!hasTransitions()"
    [class.opacity-100]="isOpen()"
    [class.opacity-0]="!isOpen()"
    (keydown.escape)="closeDrawer()"
    (keydown.enter)="closeDrawer()"
    (keydown.space)="closeDrawer()"
    tabindex="0"
    role="button"
    aria-label="Close cart"
  ></div>

  <div
    class="fixed inset-y-0 right-0 z-50 flex h-full w-screen flex-col bg-white shadow-2xl transition-transform ease-in-out will-change-transform md:[left:var(--sidebar-width,0px)] md:[width:calc(100vw-var(--sidebar-width,0px))]"
    style="padding-top: max(var(--safe-area-top, 0px), env(safe-area-inset-top)); padding-bottom: max(var(--safe-area-bottom, 0px), env(safe-area-inset-bottom))"
    [class.duration-300]="hasTransitions()"
    [class.duration-0]="!hasTransitions()"
    [style.transform]="drawerTransform()"
    [style.transitionDuration]="drawerTransitionDuration()"
    (keydown.escape)="closeDrawer()"
    (touchstart)="onDragStart($event)"
    (touchmove)="onDragMove($event)"
    (touchend)="onDragEnd()"
    (touchcancel)="onDragEnd()"
    [attr.tabindex]="isOpen() ? 0 : -1"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="ariaLabel()"
  >
    <ng-content></ng-content>
  </div>
</div>
