<div class="flex h-full w-full flex-col rounded-t-2xl bg-white sm:-mt-4 md:mt-0 lg:flex-row">
  <div class="flex shrink-0 flex-col bg-white sm:hidden">
    <h2 class="mb-3 text-xl font-bold text-gray-900">Inventory</h2>
    <nav
      role="tablist"
      class="flex w-full items-end gap-4 overflow-x-auto border-b border-gray-200 pb-2 text-sm [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"
      aria-label="Inventory tabs"
    >
      @for (tab of inventoryTabs; track tab.route) {
        <a
          [routerLink]="tab.path"
          role="tab"
          [attr.data-inventory-tab]="tab.route"
          class="relative flex shrink-0 rounded-md px-2 py-1 font-bold text-gray-500 transition-colors"
          [class.text-gray-900]="isActive(tab.route)"
          [attr.aria-selected]="isActive(tab.route)"
          [attr.aria-label]="tab.ariaLabel"
          (click)="scrollInventoryTabIntoView(tab.route)"
        >
          <span class="relative"> {{ tab.label }} </span>
          <span
            class="absolute right-2 -bottom-2 left-2 h-0.5 rounded-full bg-gray-700 transition-opacity"
            [class.opacity-100]="isActive(tab.route)"
            [class.opacity-0]="!isActive(tab.route)"
          ></span>
        </a>
      }
    </nav>
  </div>

  <div class="flex h-full min-h-0 flex-1 flex-col">
    <router-outlet />
  </div>
</div>
